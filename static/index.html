<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fractal Explorer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- =========================================================
     TOP BAR
     ========================================================= -->
<header class="top-bar">
  <span class="app-title">Fractal Explorer</span>

  <!-- Formula selector -->
  <div class="formula-group">
    <button class="formula-btn active" data-formula="Mandelbrot">Mandelbrot</button>
    <button class="formula-btn" data-formula="Mandelbrot2">Mandelbrot²</button>
    <button class="formula-btn" data-formula="Mandelbrot3">Mandelbrot³</button>
    <button class="formula-btn" data-formula="Mandelbrot4">Mandelbrot⁴</button>
    <button class="formula-btn" data-formula="Barnsley">Barnsley</button>
    <button class="formula-btn" data-formula="Barnsley2">Barnsley 2</button>
    <button class="formula-btn" data-formula="Barnsley3">Barnsley 3</button>
    <button class="formula-btn" data-formula="Triangle">Triangle</button>
    <button class="formula-btn" data-formula="Spider">Spider</button>
    <button class="formula-btn" data-formula="Phoenix">Phoenix</button>
    <button class="formula-btn" data-formula="Magnet">Magnet</button>
    <button class="formula-btn" data-formula="Newton">Newton</button>
  </div>

  <!-- Mode -->
  <div class="btn-group">
    <button id="btn-mandelbrot" class="toggle-btn active" title="Mandelbrot mode">Mandelbrot</button>
    <button id="btn-julia-mode" class="toggle-btn" title="Julia mode">Julia</button>
  </div>

  <!-- Control mode -->
  <div class="btn-group">
    <button class="ctrl-btn" data-ctrl="zoom"   title="Zoom mode (Z)">⬚ Zoom</button>
    <button class="ctrl-btn" data-ctrl="center" title="Center mode (C)">✛ Center</button>
    <button class="ctrl-btn" data-ctrl="julia"  title="Julia preview (J)">◎ Preview</button>
  </div>

  <!-- Zoom controls -->
  <div class="btn-group">
    <button id="btn-zoom-in"  title="Zoom in (+)">＋</button>
    <button id="btn-zoom-out" title="Zoom out (-)">－</button>
    <button id="btn-default"  title="Reset view">⌂ Reset</button>
  </div>

  <button id="btn-rerender" title="Re-render">↺ Render</button>
  <button id="btn-export-png" title="Export PNG">⬇ PNG</button>
</header>

<!-- =========================================================
     MAIN LAYOUT: canvas + right panel
     ========================================================= -->
<div class="main-layout">

  <!-- Canvas area -->
  <div id="canvas-wrapper" class="canvas-wrapper">
    <div class="canvas-stack">
      <canvas id="fractal-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
    </div>
    <!-- Julia preview overlay -->
    <div id="julia-overlay" class="julia-overlay" style="display:none">
      <div class="julia-overlay-label">Julia preview</div>
      <canvas id="julia-preview-canvas" width="150" height="150"></canvas>
    </div>
  </div>

  <!-- Right-side control panel -->
  <aside class="panel">

    <!-- Status labels -->
    <section class="panel-section">
      <div class="info-grid">
        <span class="info-key">Formula</span>  <span id="lbl-formula"  class="info-val">Mandelbrot</span>
        <span class="info-key">Mode</span>      <span id="lbl-mode"     class="info-val">Mandelbrot</span>
        <span class="info-key">In-color</span>  <span id="lbl-incolor"  class="info-val">none</span>
        <span class="info-key">Out-color</span> <span id="lbl-outcolor" class="info-val">iter</span>
        <span class="info-key">Size</span>       <span id="lbl-size"     class="info-val">512×512</span>
        <span class="info-key">Control</span>   <span id="lbl-control"  class="info-val">zoom</span>
        <span class="info-key">Renderer</span>  <span id="lbl-render"   class="info-val">squared</span>
      </div>
    </section>

    <!-- Numeric parameters -->
    <section class="panel-section">
      <h3 class="section-title">Parameters</h3>
      <div class="param-grid">
        <label>Iterations</label>
        <input id="inp-iterations" type="number" min="1" max="10000" value="120" />

        <label>Bailout</label>
        <input id="inp-bailout" type="number" step="any" value="4.0" />

        <label>Rotation °</label>
        <input id="inp-rotation" type="number" step="any" value="0" />
      </div>
    </section>

    <section class="panel-section">
      <h3 class="section-title">View</h3>
      <div class="param-grid">
        <label>Zoom X</label>
        <input id="inp-zoom-x" type="number" step="any" value="1" />

        <label>Zoom Y</label>
        <input id="inp-zoom-y" type="number" step="any" value="1" />

        <label>Center Re</label>
        <input id="inp-origin-x" type="number" step="any" value="0" />

        <label>Center Im</label>
        <input id="inp-origin-y" type="number" step="any" value="0" />
      </div>
    </section>

    <section class="panel-section">
      <h3 class="section-title">Julia seed</h3>
      <div class="param-grid">
        <label>Re</label>
        <input id="inp-julia-re" type="number" step="any" value="-0.7" />

        <label>Im</label>
        <input id="inp-julia-im" type="number" step="any" value="0.27" />
      </div>
    </section>

    <section class="panel-section">
      <h3 class="section-title">Perturbation</h3>
      <div class="param-grid">
        <label>Re</label>
        <input id="inp-pert-re" type="number" step="any" value="0" />

        <label>Im</label>
        <input id="inp-pert-im" type="number" step="any" value="0" />
      </div>
    </section>

    <!-- Coloring -->
    <section class="panel-section">
      <h3 class="section-title">Coloring</h3>
      <div class="param-grid">
        <label>Interior</label>
        <select id="sel-incolor">
          <option value="none">none</option>
          <option value="zmag">zmag</option>
          <option value="real/imag">real/imag</option>
          <option value="color decomp.">color decomp.</option>
          <option value="squares">squares</option>
        </select>

        <label>Exterior</label>
        <select id="sel-outcolor">
          <option value="iter">iter</option>
          <option value="iter+real">iter+real</option>
          <option value="iter+imag">iter+imag</option>
          <option value="iter+real/imag">iter+real/imag</option>
          <option value="binary decomp.">binary decomp.</option>
          <option value="color decomp.">color decomp.</option>
          <option value="potential">potential</option>
        </select>
      </div>
    </section>

    <!-- Rendering & Size -->
    <section class="panel-section">
      <h3 class="section-title">Rendering</h3>
      <div class="param-grid">
        <label>Mode</label>
        <select id="sel-rendermode">
          <option value="squared">Progressive</option>
          <option value="linear">Linear</option>
        </select>

        <label>Image size</label>
        <select id="sel-size"></select>

        <label>Lock ratio</label>
        <input id="chk-lockratio" type="checkbox" checked />
      </div>
    </section>

    <!-- Palette -->
    <section class="panel-section">
      <h3 class="section-title">Palette</h3>
      <canvas id="palette-canvas" class="palette-bar"></canvas>
      <div class="palette-presets">
        <button class="palette-preset" data-preset="Greyscale">Grey</button>
        <button class="palette-preset" data-preset="Red">Red</button>
        <button class="palette-preset" data-preset="Fire">Fire</button>
        <button class="palette-preset" data-preset="Blue">Blue</button>
        <button class="palette-preset" data-preset="Green">Green</button>
        <button class="palette-preset" data-preset="Sunset">Sunset</button>
        <button class="palette-preset" data-preset="Ocean">Ocean</button>
        <button class="palette-preset" data-preset="random">Random</button>
      </div>
      <div class="param-grid" style="margin-top:6px">
        <label>Name</label>
        <input id="inp-palette-name" type="text" placeholder="palette name" />
        <label></label>
        <div class="btn-row">
          <button id="btn-save-palette" class="small-btn">Save</button>
          <select id="sel-load-palette" style="flex:1"><option value="">— select —</option></select>
          <button id="btn-load-palette" class="small-btn">Load</button>
        </div>
      </div>
    </section>

    <!-- Save / Load fractal -->
    <section class="panel-section">
      <h3 class="section-title">Save / Load</h3>
      <div class="param-grid">
        <label>Name</label>
        <input id="inp-save-name" type="text" placeholder="fractal name" />
        <label></label>
        <button id="btn-save-fractal" class="action-btn">💾 Save fractal</button>

        <label></label>
        <div class="btn-row">
          <select id="sel-load-fractal" style="flex:1"><option value="">— select —</option></select>
          <button id="btn-load-fractal" class="small-btn">Load</button>
          <button id="btn-delete-fractal" class="small-btn danger">✕</button>
        </div>
      </div>
    </section>

    <!-- Keyboard help -->
    <section class="panel-section help-section">
      <h3 class="section-title">Keys</h3>
      <div class="key-help">
        <kbd>Z</kbd> zoom &nbsp; <kbd>C</kbd> center &nbsp; <kbd>J</kbd> julia<br/>
        <kbd>+</kbd><kbd>-</kbd> zoom &nbsp; <kbd>←→↑↓</kbd> pan
      </div>
    </section>

  </aside>
</div>

<!-- Status bar -->
<footer id="status-bar" class="status-bar">Ready</footer>

<script src="js/app.js"></script>
</body>
</html>
